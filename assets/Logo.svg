<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" fill="none">
  <defs>
    <!-- Glow and Neon Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
  </defs>

  <!-- Monogram Part with Glow -->
  <g filter="url(#neon-glow)" transform="translate(75, -5) scale(0.7)">
    <!-- Outer 'G' Loop -->
    <path d="M 230 140 A 110 110 0 1 0 250 350 A 110 110 0 0 0 320 280 L 250 280" 
          fill="none" stroke="url(#neon-cyan)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Inner 'G' Curve -->
    <path d="M 215 190 A 60 60 0 1 0 220 300" 
          fill="none" stroke="url(#neon-blue)" stroke-width="12" stroke-linecap="round" />
    <!-- 'A' Left leg -->
    <path d="M 305 155 L 235 345" 
          fill="none" stroke="url(#neon-cyan)" stroke-width="24" stroke-linecap="round" />
    <!-- 'A' Right leg -->
    <path d="M 305 155 L 375 330 A 15 15 0 0 1 365 350 A 15 15 0 0 1 350 345 L 340 320" 
          fill="none" stroke="url(#neon-cyan)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <!-- 'A' Crossbar -->
    <path d="M 250 280 L 338 280" 
          fill="none" stroke="url(#neon-cyan)" stroke-width="20" stroke-linecap="round" />
  </g>

  <!-- Text: Ghayas Awan -->
  <text x="250" y="340" text-anchor="middle" font-family="'Outfit', 'Inter', sans-serif" font-size="44" font-weight="800" fill="#FFFFFF">Ghayas Awan</text>

  <!-- Text: SOFTWARE ENGINEER -->
  <text x="250" y="390" text-anchor="middle" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="900" fill="#00F0FF" letter-spacing="4">SOFTWARE ENGINEER</text>

  <!-- Underline decorative -->
  <line x1="200" y1="420" x2="300" y2="420" stroke="#00F0FF" stroke-width="2" stroke-opacity="0.6"/>
</svg>
